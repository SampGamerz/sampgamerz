<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samp Gamerz</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f0f0f;
  color: white;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img {
  height: 45px;
  width: auto;
}
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  background: #181818;
  border-bottom: 2px solid red;
}

.logo {
  font-size: 20px;
  font-weight: bold;
}

.subscribe {
  background: red;
  padding: 8px 15px;
  border-radius: 5px;
  text-decoration: none;
  color: white;
}

.hero {
  text-align: center;
  padding: 30px 15px;
}

.hero h1 {
  font-size: 28px;
}

.videos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
  padding: 15px;
}

.video {
  cursor: pointer;
  transition: 0.3s;
}

.video img {
  width: 100%;
  border-radius: 10px;
}

.video:hover {
  transform: scale(1.05);
}

.player {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.player iframe {
  width: 90%;
  height: 50%;
  border-radius: 10px;
}

.close {
  position: absolute;
  top: 20px;
  right: 20px;
  font-size: 25px;
  cursor: pointer;
}

.footer {
  text-align: center;
  padding: 15px;
  opacity: 0.6;
}
</style>

</head>

<body>

<header>
  <div class="logo">
  <img src="logo.png" alt="Samp Gamerz">
  </div>
  <a class="subscribe" href="https://youtube.com/@samp_gamerz" target="_blank">
    Subscribe
  </a>
</header>

<section class="hero">
  <h1>Welcome to Samp Gamerz 🔥</h1>
  <p>Gaming videos,SAMP Related Contents etc ..</p>
</section>

<section class="videos" id="videoContainer"></section>

<!-- Video Player -->
<div class="player" id="player">
  <span class="close" onclick="closePlayer()">✖</span>
  <iframe id="videoFrame" src="" allowfullscreen></iframe>
</div>

<div class="footer">© 2026 Samp Gamerz</div>

<script>
const channelID = "UC0D3xV9kQ2V9gR8nQdH6w5A";

const container = document.getElementById("videoContainer");

// Fetch videos using RSS2JSON (fixed method)
fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=${channelID}`)
.then(res => res.json())
.then(data => {
  let output = "";

  data.items.slice(0, 8).forEach(video => {
    const videoId = video.link.split("v=")[1];

    output += `
      <div class="video" onclick="playVideo('${videoId}')">
        <img src="https://img.youtube.com/vi/${videoId}/hqdefault.jpg">
      </div>
    `;
  });

  container.innerHTML = output;
});

// Play video
function playVideo(id) {
  document.getElementById("player").style.display = "flex";
  document.getElementById("videoFrame").src =
    "https://www.youtube.com/embed/" + id;
}

// Close player
function closePlayer() {
  document.getElementById("player").style.display = "none";
  document.getElementById("videoFrame").src = "";
}
</script>

</body>
</html>
