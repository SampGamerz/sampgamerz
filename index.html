<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samp Gamerz</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0f0f0f;
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px;
  background: #181818;
  border-bottom: 2px solid red;
}

.logo {
  font-size: 22px;
  font-weight: bold;
}

.subscribe {
  background: red;
  padding: 10px 18px;
  border-radius: 6px;
  text-decoration: none;
  color: white;
}

.hero {
  text-align: center;
  padding: 40px 20px;
}

.hero h1 {
  font-size: 36px;
}

.videos {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 15px;
  padding: 20px;
}

iframe {
  width: 100%;
  height: 200px;
  border-radius: 12px;
  border: none;
}

.footer {
  text-align: center;
  padding: 20px;
  opacity: 0.6;
}

.loader {
  text-align: center;
  padding: 20px;
}
</style>

</head>

<body>

<header>
  <div class="logo">🎮 Samp Gamerz</div>
  <a class="subscribe" href="https://youtube.com/@samp_gamerz" target="_blank">
    Subscribe
  </a>
</header>

<section class="hero">
  <h1>Welcome to Samp Gamerz 🔥</h1>
  <p>Gaming videos, tutorials & fun content</p>
</section>

<div class="loader" id="loader">Loading videos...</div>

<section class="videos" id="videoContainer"></section>

<div class="footer">
  © 2026 Samp Gamerz
</div>

<script>
const channelID = "UC0D3xV9kQ2V9gR8nQdH6w5A";
const url = `https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=${channelID}`;

fetch(url)
.then(res => res.json())
.then(data => {
  let output = "";

  data.items.slice(0, 8).forEach(video => {
    const videoId = video.link.split("v=")[1];

    output += `
      <iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>
    `;
  });

  document.getElementById("videoContainer").innerHTML = output;
  document.getElementById("loader").style.display = "none";
});
</script>

</body>
</html>
